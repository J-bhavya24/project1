# ── Server ───────────────────────────────────────────────
server.port=8085
spring.application.name=auth-server

# ── MySQL Database ────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/auth_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ── JWT ───────────────────────────────────────────────────
# Generate your own Base64 secret (min 32 chars before encoding):
#   echo -n "mySecretKey1234567890abcdefghij12" | base64
jwt.secret=bXlTZWNyZXRLZXkxMjM0NTY3ODkwYWJjZGVmZ2hpajEy
jwt.expiration-ms=86400000

# ── GitHub OAuth2 ─────────────────────────────────────────
# Steps to get these values:
#  1. Go to https://github.com/settings/developers
#  2. Click "New OAuth App"
#  3. Homepage URL:        http://localhost:8085
#  4. Callback URL:        http://localhost:8085/login/oauth2/code/github
#  5. Copy Client ID and Client Secret below

spring.security.oauth2.client.registration.github.client-id=YOUR_GITHUB_CLIENT_ID
spring.security.oauth2.client.registration.github.client-secret=YOUR_GITHUB_CLIENT_SECRET
spring.security.oauth2.client.registration.github.scope=read:user,user:email

# ── Swagger ───────────────────────────────────────────────
springdoc.swagger-ui.path=/swagger-ui.html
